name: CI

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 852456
          MYSQL_DATABASE: exam_platform_test
          MYSQL_USER: exam_user
          MYSQL_PASSWORD: exam_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p852456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql+mysqlconnector://exam_user:exam_pass@127.0.0.1/exam_platform_test
      SECRET_KEY: ci-secret-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL and prepare test database
        run: |
          python - <<'PY'
          import time
          import mysql.connector

          for i in range(60):
              try:
                  conn = mysql.connector.connect(
                      host="127.0.0.1",
                    user="exam_user",
                    password="exam_pass",
                      database="exam_platform_test",
                  )
                  cur = conn.cursor()
                  cur.execute("CREATE DATABASE IF NOT EXISTS exam_platform_test")
                  conn.commit()
                  cur.close()
                  conn.close()
                  print("MySQL ready")
                  break
              except Exception as exc:
                  if i == 59:
                      raise
                  print(f"Waiting for MySQL ({i + 1}/60): {exc}")
                  time.sleep(2)
          PY

      - name: Lint
        run: |
          flake8 app.py app --exclude=*_backup.py,backup_* --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: App smoke check
        run: |
          python -c "from app import create_app; app=create_app(); print(app.name)"

      - name: Run tests
        run: |
          pytest -q tests

      - name: Build Docker image
        run: |
          docker build -t exampro-ci:latest .
