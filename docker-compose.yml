services:
  web:
    build: .
    container_name: exampro-web
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: sqlite:///exampro_dev.db
      SECRET_KEY: dev-secret-key-change-me
    volumes:
      - ./instance:/app/instance
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
